<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>CAIRO Work Portal</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Inter", "Noto Sans TC", sans-serif;
  background: #ffffff;
  color: #1e293b;
}

/* Header */
.header {
  text-align: center;
  padding: clamp(42px, 7vh, 80px) 20px clamp(24px, 4vh, 40px);
  position: relative;
}

.header::before {
  content: "";
  position: absolute;
  top: clamp(30px, 5vh, 55px);
  left: 50%;
  transform: translateX(-50%);
  width: clamp(220px, 28vw, 350px);
  height: clamp(90px, 14vw, 150px);
  background: #ffe066;
  border-radius: 50px;
  filter: blur(60px);
  opacity: 0.55;
}

.logo {
  width: clamp(90px, 9vw, 130px);
  margin-bottom: clamp(18px, 4vh, 38px);
  position: relative;
  z-index: 1;
}

.header h1 {
  margin: 0 0 10px;
  font-size: clamp(28px, 3vw, 42px);
  font-weight: 700;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 1;
}

.header p {
  color: #64748b;
  font-size: clamp(14px, 1.2vw, 17px);
  margin: 0;
  position: relative;
  z-index: 1;
}

.line {
  width: 42px;
  height: 3px;
  background: #ffcc00;
  margin: 12px auto 20px;
  border-radius: 10px;
  position: relative;
  z-index: 1;
}

/* Container */
.container {
  width: min(100% - 48px, 1200px);
  margin: clamp(28px, 6vh, 70px) auto 0;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(20px, 3vw, 32px);
}

/* Card */
.card {
  background: white;
  border-radius: 20px;
  padding: clamp(24px, 3vw, 34px);
  border: 2px solid #f1f5f9;
  box-shadow: 0 8px 25px rgba(0,0,0,0.04);
  transition: 0.25s ease;
  position: relative;
  min-height: clamp(220px, 28vh, 280px);
}

.card:hover {
  border-color: #facc15;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  transform: translateY(-4px);
}

.icon {
  width: 50px;
  height: 50px;
  border-radius: 14px;
  background: #f6f7fa;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 18px;
}

.card h3 {
  margin: 0 0 10px;
  font-size: clamp(18px, 1.6vw, 22px);
}

.card p {
  color: #64748b;
  font-size: clamp(13px, 1.1vw, 15px);
  line-height: 1.7;
}

.link {
  margin-top: 20px;
  display: inline-block;
  font-weight: 700;
  color: #0f3b73;
  text-decoration: none;
}

.link:hover {
  color: #c58a00;
}

/* Footer */
.footer {
  text-align: center;
  color: #94a3b8;
  font-size: 13px;
  margin: clamp(50px, 10vh, 120px) 0 28px;
}

/* 平板 */
@media (max-width: 1000px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .container {
    width: min(100% - 40px, 680px);
  }
}

</style>

</head>

<body>

<div class="header">
  <img src="logo2.png" class="logo">
  <h1>CAIRO Internal Portal</h1>
  <div class="line"></div>
  <p>內部系統快速入口</p>
</div>

<div class="container">
  <div class="grid">

    <div class="card">
      <div class="icon">📋</div>
      <h3>產品資料庫</h3>
      <p>查詢及管理所有產品資料與規格說明</p>
      <a href="#" class="link">前往系統 →</a>
    </div>

    <div class="card">
      <div class="icon">👥</div>
      <h3>業務案件管理</h3>
      <p>追蹤業務案件進度及績效管理</p>
      <a href="https://sales-crm-system-production.up.railway.app/" class="link">前往系統 →</a>
    </div>

    <div class="card">
      <div class="icon">📦</div>
      <h3>產品庫存管理</h3>
      <p>即時庫存查詢、入出庫記錄與盤點管理</p>
      <a href="https://cairoinventory-aff3hcdxhadhc8bn.southeastasia-01.azurewebsites.net/" class="link">前往系統 →</a>
    </div>

  </div>
</div>
  

<div class="footer">
  © 2026 CAIRO Quality & Design. 僅供內部使用。
</div>

</body>
</html>
