<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>CAIRO Work Portal</title>

<style>
body {
  margin: 0;
  font-family: "Inter", "Noto Sans TC", sans-serif;
  background: #ffffff;
  color: #1e293b;
}

/* Header */
.header {
  text-align: center;
  padding: 70px 20px 30px;
  position: relative;
}

/* 黃色裝飾（低調品牌感） */
.header::before {
  content: "";
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 350px;
  height: 150px;
  background: #ffe066;
  border-radius: 50px;
  filter: blur(60px);
  opacity: 0.6;
}

/* Logo */
.logo {
  width: 130px;
  margin-top: 10px;
  margin-bottom: 10px;
  position: relative;
}

/* Title */
.header h1 {
  margin: 40px 0 10px;
  font-size: 30px;
  font-weight: 700;
  position: relative;
}

.header p {
  color: #64748b;
}

/* underline */
.line {
  width: 40px;
  height: 3px;
  background: #ffcc00;
  margin: 10px auto;
  border-radius: 10px;
}

/* Container */
.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 20px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

/* Card */
.card {
  background: white;
  border-radius: 20px;
  padding: 30px;
  border: 1px solid #f1f5f9;
  box-shadow: 0 8px 25px rgba(0,0,0,0.04);
  transition: 0.25s;
  position: relative;
}

.card:hover {
  border: 3px solid #facc15; /* 黃色 */
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  transform: translateY(-4px);
}



/* icon */
.icon {
  width: 50px;
  height: 50px;
  border-radius: 14px;
  background: #eef4fa;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 18px;
}

/* title */
.card h3 {
  margin: 0 0 10px;
  font-size: 20px;
}

/* text */
.card p {
  color: #64748b;
  font-size: 14px;
  line-height: 1.6;
}

/* link */
.link {
  margin-top: 20px;
  display: inline-block;
  font-weight: 600;
  color: #0f3b73;
  text-decoration: none;
}

.link:hover {
  text-decoration: underline;
}

/* footer */
.footer {
  text-align: center;
  color: #94a3b8;
  font-size: 13px;
  margin: 150px 0;
}

</style>

</head>

<body>

<div class="header">
  <img src="logo2.png" class="logo">
  <h1>CAIRO Internal Portal</h1>
  <div class="line"></div>
  <p>內部系統快速入口</p>
</div>

<div class="container">
  <div class="grid">

    <div class="card">
      <div class="icon">📋</div>
      <h3>產品資料庫</h3>
      <p>查詢及管理所有產品資料與規格說明</p>
      <a href="#" class="link">前往系統 →</a>
    </div>

    <div class="card">
      <div class="icon">👥</div>
      <h3>業務案件管理</h3>
      <p>追蹤業務案件進度及績效管理</p>
      <a href="https://sales-crm-system-production.up.railway.app/" class="link">前往系統 →</a>
    </div>

    <div class="card">
      <div class="icon">📦</div>
      <h3>產品庫存管理</h3>
      <p>即時庫存查詢、入出庫記錄與盤點管理</p>
      <a href="https://cairoinventory-aff3hcdxhadhc8bn.southeastasia-01.azurewebsites.net/" class="link">前往系統 →</a>
    </div>

  </div>
</div>

<div class="footer">
  © 2026 CAIRO Quality & Design. 僅供內部使用。
</div>

</body>
</html>
